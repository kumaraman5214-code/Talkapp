<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TalkZone Clean</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#0d1117;color:#fff;font-family:sans-serif}
.box{max-width:400px;margin:auto;padding:20px}
input,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px}
input{background:#161b22;color:#fff}
button{background:#2ea043;color:#fff;font-weight:bold}
.user{padding:10px;border-bottom:1px solid #30363d;cursor:pointer}
.msg{margin:5px 0}
.me{color:#00ff9d}
</style>
</head>

<body>

<div class="box" id="login">
  <h2>TalkZone</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login / Signup</button>
</div>

<div class="box" id="search" style="display:none">
  <h3>Search User</h3>
  <input id="searchUser" placeholder="Type username...">
  <div id="list"></div>
</div>

<div class="box" id="chat" style="display:none">
  <h3 id="chatName"></h3>
  <div id="msgs"></div>
  <input id="m" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<script>

// ✅ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentChat=null;

// ❌ AUTO LOGIN OFF
window.onload = ()=> auth.signOut();

// LOGIN
function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(!u || u.length<3){
    alert("Username 3+ required");
    return;
  }

  if(!p || p.length<6){
    alert("Password 6+ required");
    return;
  }

  let email=u+"@chat.com";

  auth.signInWithEmailAndPassword(email,p)
  .catch(async ()=>{
    let cred=await auth.createUserWithEmailAndPassword(email,p);

    await db.collection("users").doc(cred.user.uid).set({
      name:u,
      uid:cred.user.uid
    });
  });
}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    document.getElementById("search").style.display="block";
  }
});

// 🔍 SEARCH USER
document.getElementById("searchUser").oninput=function(){
  let val=this.value.toLowerCase();

  db.collection("users").get().then(snap=>{
    let list=document.getElementById("list");
    list.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();

      if(!u.name) return;
      if(u.uid===ME.uid) return;

      if(u.name.includes(val)){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=u.name;

        div.onclick=()=>openChat(u);

        list.appendChild(div);
      }
    });
  });
};

// OPEN CHAT
function openChat(user){
  currentChat=[ME.uid,user.uid].sort().join("_");

  document.getElementById("search").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("chatName").innerText=user.name;

  loadMessages();
}

// LOAD MESSAGES
function loadMessages(){
  db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("msgs");
    box.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();
      let div=document.createElement("div");

      div.className="msg";
      if(m.uid===ME.uid) div.className+=" me";

      div.innerText=m.text;
      box.appendChild(div);
    });
  });
}

// SEND
function send(){
  let text=document.getElementById("m").value;
  if(!text) return;

  db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .add({
    text:text,
    uid:ME.uid,
    time:Date.now()
  });

  document.getElementById("m").value="";
}

</script>

</body>
</html>
