<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}
#app{display:flex;height:100vh}

/* LEFT */
#sidebar{width:30%;background:#111b21;overflow-y:auto}
.header{padding:15px;background:#202c33}
.user{padding:15px;border-bottom:1px solid #222;cursor:pointer}
.user:hover{background:#202c33}

/* RIGHT */
#chatBox{width:70%;display:flex;flex-direction:column}
#chatHeader{padding:15px;background:#202c33}
#messages{flex:1;overflow-y:auto;padding:15px}
.msg{margin:8px 0;padding:10px;border-radius:8px;max-width:60%}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

/* INPUT */
#inputBox{display:flex;padding:10px;background:#202c33}
#inputBox input{flex:1;padding:10px;border:none;border-radius:8px}
#inputBox button{margin-left:10px;padding:10px;border:none;border-radius:8px;background:#00a884;color:white}
</style>
</head>

<body>

<div id="login" style="padding:20px">
  <h2>TalkZone</h2>
  <input id="u" placeholder="Username"><br><br>
  <input id="p" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login / Signup</button>
</div>

<div id="app" style="display:none">

  <div id="sidebar">
    <div class="header">Users</div>
    <div id="users"></div>
  </div>

  <div id="chatBox">
    <div id="chatHeader">Select user</div>
    <div id="messages"></div>

    <div id="inputBox">
      <input id="msgInput" placeholder="Type message...">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>

// ✅ YOUR ORIGINAL CONFIG (ADDED)
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentChat=null;
let unsubscribe=null;

// LOGIN
function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(!u || u.length<3){
    alert("Username 3+ required");
    return;
  }

  if(!p || p.length<6){
    alert("Password 6+ required");
    return;
  }

  let email=u+"@chat.com";

  auth.signInWithEmailAndPassword(email,p)
  .catch(async ()=>{
    let cred=await auth.createUserWithEmailAndPassword(email,p);

    await db.collection("users").doc(cred.user.uid).set({
      name:u,
      uid:cred.user.uid
    });
  });
}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    loadUsers();
  }
});

// LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;

      div.onclick=()=>openChat(u);

      box.appendChild(div);
    });
  });
}

// OPEN CHAT
function openChat(user){
  currentChat=[ME.uid,user.uid].sort().join("_");

  document.getElementById("chatHeader").innerText=user.name;

  if(unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();

      let div=document.createElement("div");
      div.className="msg " + (m.uid===ME.uid?"me":"other");

      div.innerText=m.text;

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// SEND
function send(){
  let text=document.getElementById("msgInput").value;
  if(!text || !currentChat) return;

  db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .add({
    text:text,
    uid:ME.uid,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
}

</script>

</body>
  </html>
